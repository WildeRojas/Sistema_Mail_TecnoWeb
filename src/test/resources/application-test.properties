# Perfil "test": usado por pruebas de integracion sobre H2 en memoria (modo de
# compatibilidad PostgreSQL), sin Docker ni servicios externos. GreenMail (SMTP/POP3)
# y WireMock (stub de Pago Facil) corren en proceso, con puertos dinamicos que
# IntegracionBaseTest sobreescribe en tiempo de ejecucion via @DynamicPropertySource:
#
#   @DynamicPropertySource
#   static void props(DynamicPropertyRegistry registry) {
#       registry.add("mail.server", () -> "127.0.0.1");
#       registry.add("mail.smtp.port", () -> greenMail.getSmtp().getPort());
#       registry.add("mail.pop3.port", () -> greenMail.getPop3().getPort());
#       registry.add("pagofacil.url.base", () -> "http://localhost:" + wireMockServer.port());
#   }

spring.datasource.url=jdbc:h2:mem:sistema_mail;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Los tests siembran sus propios datos; el seeder de la app queda deshabilitado.
app.seed.enabled=false

# Defaults de arranque (los tests de integracion los sobreescriben con puertos dinamicos).
mail.server=${MAIL_SERVER:localhost}
mail.smtp.port=${MAIL_SMTP_PORT:3025}
mail.pop3.port=${MAIL_POP3_PORT:3110}
mail.user=${MAIL_USER:bot@tiendasjunior.local}
mail.password=${MAIL_PASSWORD:bot}

pagofacil.url.base=${PAGOFACIL_URL_BASE:http://localhost:8089}
pagofacil.token.service=${PAGOFACIL_TOKEN_SERVICE:stub}
pagofacil.token.secret=${PAGOFACIL_TOKEN_SECRET:stub}
pagofacil.callback.url=${PAGOFACIL_CALLBACK_URL:http://localhost:8080/pagos/pagofacil/callback}
pagofacil.monto.tope=${PAGOFACIL_MONTO_TOPE:0}

app.mail.spool.dir=${java.io.tmpdir}/spool-test

# Los jobs @Scheduled (poll de buzon POP3 y flush del spool SMTP) se desactivan en la
# practica durante las pruebas (delay enorme) para que no compitan por el mismo
# GreenMail compartido con las llamadas directas a checkInbox()/flushSpool() que hacen
# las pruebas de integracion/E2E/resiliencia. Las pruebas invocan esos metodos
# publicos directamente cuando necesitan ejercitar el ciclo. En dev/produccion no se
# define esta propiedad, por lo que se usa el valor por defecto (10000/60000), igual
# que antes.
mail.receiver.poll.fixed-delay-ms=3600000
mail.sender.spool.flush-delay-ms=3600000
